  <text x="390" y="220" font-family="Arial Black, sans-serif" font-weight="900" font-size="72" fill="white" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Arial Black&quot;, sans-serif;font-size:72px;font-weight:900;text-anchor:start;dominant-baseline:auto">Fondo Sur</text>
