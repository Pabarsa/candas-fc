  <text x="392" y="370" font-family="Arial, sans-serif" font-weight="400" font-size="28" fill="white" opacity="0.8" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.8;font-family:Arial, sans-serif;font-size:28px;font-weight:400;text-anchor:start;dominant-baseline:auto">Aficionados del Candás CF</text>

