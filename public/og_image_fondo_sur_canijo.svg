  <text x="392" y="445" font-family="Arial, sans-serif" font-weight="400" font-size="22" fill="white" opacity="0.65" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.65;font-family:Arial, sans-serif;font-size:22px;font-weight:400;text-anchor:start;dominant-baseline:auto">Segunda Asturfútbol · Grupo 1 · Temporada 2025/26</text>

